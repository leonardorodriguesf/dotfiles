- defaults:
    link:
      relink: true
      create: true
      force: true

- clean: ["~"]

- link:
    ~/.config/git:
      path: git

    ~/.gitconfig:
      path: ~/.config/git/gitconfig

- create:
    ~/personal:
      mode: 0755
    ~/work:
      mode: 0755

- shell:
    - [git submodule update --init --recursive, Installing submodules]
